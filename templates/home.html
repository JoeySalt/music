<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="app-shell home-shell">
        <header class="masthead">
            <a class="brand-mark" href="/" aria-label="Vinyl Finder home">
                <span class="brand-dot"></span>
                Vinyl Finder
            </a>
            <span class="source-label">Discogs catalog search</span>
        </header>

        <section class="search-stage">
            <div class="search-copy">
                <p class="eyebrow">Catalog desk</p>
                <h1>Dig through artist releases without the clutter.</h1>

                <form action="/search" method="get" class="search-form">
                    <label class="sr-only" for="artist-search">Artist name</label>
                    <input id="artist-search" type="text" name="artist" placeholder="Kendrick Lamar" required>
                    <button type="submit">Search</button>
                </form>
            </div>

            <div class="record-visual" aria-hidden="true">
                <div class="sleeve">
                    <span class="sleeve-code">VF-01</span>
                    <span class="sleeve-title">RELEASE INDEX</span>
                    <span class="sleeve-line"></span>
                    <span class="sleeve-line short"></span>
                </div>
                <div class="record">
                    <span class="record-label"></span>
                </div>
            </div>
        </section>
    </main>
</body>
