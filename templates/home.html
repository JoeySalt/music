<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="app-shell home-shell">
        <header class="masthead">
            <a class="brand-mark" href="/" aria-label="Vinyl Finder home">
                <span class="brand-dot"></span>
                Vinyl Finder
            </a>
            <nav class="masthead-actions" aria-label="Primary">
                <a href="{{ url_for('favorites') }}" class="top-link">Favorites</a>
                <span class="source-label">Discogs catalog search</span>
            </nav>
        </header>

        <section class="search-stage">
            <div class="search-copy">
                <p class="eyebrow">Catalog desk</p>
                <h1>Dig through artists, albums and songs without the clutter.</h1>

                <form action="/search" method="get" class="search-form">
                    <label class="sr-only" for="catalog-search">Artist, album or song</label>
                    <input id="catalog-search" type="text" name="q" placeholder="Kendrick Lamar, DAMN., HUMBLE." required>
                    <button type="submit">Search</button>
                </form>
            </div>

            <div class="record-visual" aria-hidden="true">
                <div class="sleeve">
                    <span class="sleeve-code">VF-01</span>
                    <span class="sleeve-title">RELEASE INDEX</span>
                    <span class="sleeve-line"></span>
                    <span class="sleeve-line short"></span>
                </div>
                <div class="record">
                    <span class="record-label"></span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
